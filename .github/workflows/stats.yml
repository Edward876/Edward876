name: refresh stats

on:
  schedule:                 # rebuild the pixel stats panel every day
    - cron: "30 0 * * *"
  workflow_dispatch:        # run on demand from the Actions tab
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: build stats svg
        env:
          # GITHUB_TOKEN works for public data. For PRIVATE contributions to
          # count, create a PAT (classic, read:user + repo) and add it as a
          # secret named STATS_TOKEN — it will be used automatically.
          GH_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
          GH_LOGIN: ${{ github.repository_owner }}
        run: python .github/scripts/pixel_stats.py

      - name: commit if changed
        run: |
          git config user.name "stats-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg
          git diff --staged --quiet || git commit -m "chore: refresh pixel stats [skip ci]"
          git push
